<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Radial gradient for the portal core -->
    <radialGradient id="portalCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a3f7bf" />
      <stop offset="35%" stop-color="#39ff14" />
      <stop offset="65%" stop-color="#05b144" />
      <stop offset="85%" stop-color="#023d18" />
      <stop offset="100%" stop-color="#0b0f19" />
    </radialGradient>

    <!-- Linear gradient for glowing swirls -->
    <linearGradient id="portalSwirl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#a3f7bf" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#05b144" stop-opacity="0" />
    </linearGradient>

    <!-- Drop shadow glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep dark futuristic space outer background ring -->
  <circle cx="256" cy="256" r="236" fill="#0b0f19" stroke="#10192e" stroke-width="12" />

  <!-- Portal backdrop -->
  <circle cx="256" cy="256" r="200" fill="url(#portalCore)" filter="url(#glow)" />

  <!-- Portal Swirling spirals/arms -->
  <g stroke="url(#portalSwirl)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M 256,256 C 290,210 370,190 390,240 C 410,290 330,370 270,350 C 210,330 150,230 210,170 C 270,110 410,130 430,230" />
    <path transform="rotate(90, 256, 256)" d="M 256,256 C 290,210 370,190 390,240 C 410,290 330,370 270,350 C 210,330 150,230 210,170 C 270,110 410,130 430,230" />
    <path transform="rotate(180, 256, 256)" d="M 256,256 C 290,210 370,190 390,240 C 410,290 330,370 270,350 C 210,330 150,230 210,170 C 270,110 410,130 430,230" />
    <path transform="rotate(270, 256, 256)" d="M 256,256 C 290,210 370,190 390,240 C 410,290 330,370 270,350 C 210,330 150,230 210,170 C 270,110 410,130 430,230" />
  </g>

  <!-- Glowing energy drops / bubbles floating on the portal -->
  <g fill="#39ff14" filter="url(#glow)">
    <circle cx="210" cy="180" r="16" opacity="0.9" fill="#a3f7bf" />
    <circle cx="310" cy="300" r="12" opacity="0.8" />
    <circle cx="290" cy="160" r="18" opacity="0.95" />
    <circle cx="170" cy="280" r="14" opacity="0.75" />
    <circle cx="340" cy="210" r="10" opacity="0.8" fill="#a3f7bf" />
    <circle cx="190" cy="330" r="8" opacity="0.9" />
  </g>

  <!-- Portal core shine effect -->
  <circle cx="256" cy="256" r="40" fill="#ffffff" opacity="0.25" filter="url(#glow)" />
</svg>
